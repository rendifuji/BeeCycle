<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeeCycle | Edit Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="./edit-profile.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container">
        <a href="../marketplace/home.html" class="logo"><span>Bee</span>Cycle</a>
        <nav>
          <div class="search">
            <img src="../assets/icons/search.svg" />
            <input type="text" placeholder="Search for textbooks, electronics, etc..." />
          </div>
        </nav>
        <div class="buttons">
          <a class="btn btn-secondary" href="../marketplace/sell-item.html"><img src="../assets/icons/plus.svg" alt="" />Sell Item</a>
          <div class="avatar">YS</div>
        </div>
      </div>
    </header>
    <main class="edit-profile-main">
      <section class="edit-profile-section">
        <div class="container">
          <div class="edit-profile-shell">
            <div class="edit-profile-heading">
              <h1>Edit Profile</h1>
              <p>Update your contact details and campus location.</p>
            </div>

            <form class="edit-profile-form" action="./user-profile-dashboard.html" novalidate>
              <div class="edit-profile-grid">
                <div class="form-field">
                  <label for="binus-email">Binus Email</label>
                  <input
                    id="binus-email"
                    name="binus-email"
                    type="email"
                    placeholder="Enter your Binus email"
                  />
                </div>

                <div class="form-field">
                  <label for="student-id">Student ID / NIM</label>
                  <input
                    id="student-id"
                    name="student-id"
                    type="text"
                    placeholder="Enter your student ID"
                  />
                </div>
              </div>

              <div class="form-field">
                <label for="full-name">Full Name</label>
                <input
                  id="full-name"
                  name="full-name"
                  type="text"
                  placeholder="Enter your full name"
                />
              </div>

              <div class="form-field">
                <label for="campus-location">Campus Location</label>
                <div class="select-wrap">
                  <select id="campus-location" name="campus-location">
                    <option value="" selected disabled>Select your campus location</option>
                    <option>BINUS @ Kemanggisan</option>
                    <option>BINUS @ Alam Sutera</option>
                    <option>BINUS @ Anggrek</option>
                    <option>BINUS @ Bekasi</option>
                    <option>BINUS @ Malang</option>
                    <option>BINUS @ Semarang</option>
                    <option>BINUS @ Bandung</option>
                  </select>
                </div>
              </div>

              <div class="form-field">
                <label for="whatsapp-number">WhatsApp Number</label>
                <input
                  id="whatsapp-number"
                  name="whatsapp-number"
                  type="tel"
                  placeholder="Enter your WhatsApp number"
                />
              </div>

              <div class="edit-profile-actions">
                <a href="./user-profile-dashboard.html" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Submit</button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="container">
        <p class="copyright">
          &copy; 2026 BeeCycle Marketplace. All rights reserved.
        </p>
      </div>
    </footer>
    <script src="./edit-profile.js"></script>
  </body>
</html>
